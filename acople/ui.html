<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acople Test Interface</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
            --font-main: 'Inter', -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        header {
            grid-column: 1 / -1;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.danger {
            background: var(--error);
        }

        button.danger:hover {
            background: #dc2626;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error);
            margin-right: 8px;
        }

        .status-indicator.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .badge {
            background: var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .messages {
            flex-grow: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .token { color: #e2e8f0; }
        .system { color: var(--text-muted); font-style: italic; }
        .error { color: #fca5a5; }
        .event-label { color: #93c5fd; font-weight: bold; }

        .diagnostics-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .diagnostics-btn:hover {
            background: var(--border);
        }
        
        .endpoints-list {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .endpoints-list div {
            margin-bottom: 0.3rem;
            font-family: monospace;
        }

        .endpoint-method {
            color: var(--primary);
            font-weight: bold;
            margin-right: 0.5rem;
        }

        .tabs { display: flex; gap: 0; margin-bottom: 1rem; }
        .tab-btn {
            flex: 1; padding: 0.6rem 1rem; background: var(--bg); border: 1px solid var(--border);
            color: var(--text-muted); cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
        }
        .tab-btn:first-child { border-radius: 8px 0 0 8px; }
        .tab-btn:last-child { border-radius: 0 8px 8px 0; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; flex-grow: 1; }

        .image-gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem; padding: 1rem; overflow-y: auto; flex-grow: 1;
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px; min-height: 200px;
        }
        .image-card {
            border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface);
        }
        .image-card img { width: 100%; display: block; }
        .image-card .image-actions {
            padding: 0.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted);
        }
        .image-card .image-actions a { color: var(--primary); text-decoration: none; }
        .image-loading {
            display: flex; align-items: center; justify-content: center; padding: 3rem;
            color: var(--text-muted); font-style: italic;
        }
        .image-loading .spinner {
            width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Acople Interface</h1>
        <div id="connection-status">
            <span class="status-indicator" id="status-dot"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <div class="sidebar">
        <div class="panel">
            <h2 class="panel-title">Configuration</h2>
            <div class="form-group">
                <label>Server URL</label>
                <input type="text" id="server-url" value="http://localhost:8000">
            </div>
            <div class="form-group">
                <label>API Key (Optional)</label>
                <input type="password" id="api-key" placeholder="Enter API Key">
            </div>
            <button id="connect-btn">Check Connection</button>
        </div>

        <div class="panel" style="margin-top: 1rem;">
            <h2 class="panel-title">System Status</h2>
            <div id="system-info">
                <div class="info-row">
                    <span>Active Agent</span>
                    <span class="badge" id="info-agent">Unknown</span>
                </div>
                <div class="info-row">
                    <span>Image Generation</span>
                    <span class="badge" id="info-image">Unknown</span>
                </div>
            </div>
            <button class="diagnostics-btn" id="diagnostics-btn" style="margin-top: 1rem;">Run Diagnostics</button>
            
            <div class="endpoints-list">
                <div style="color: var(--text); margin-bottom:0.5rem">Available Endpoints:</div>
                <div><span class="endpoint-method">GET</span> /agents</div>
                <div><span class="endpoint-method">GET</span> /models</div>
                <div><span class="endpoint-method">GET</span> /detect</div>
                <div><span class="endpoint-method">GET</span> /diagnose</div>
                <div><span class="endpoint-method">POST</span> /chat</div>
                <div><span class="endpoint-method">POST</span> /chat/simple</div>
                <div><span class="endpoint-method">POST</span> /image/generate</div>
                <div><span class="endpoint-method">POST</span> /interrupt</div>
            </div>
        </div>
    </div>

    <div class="main-content chat-container">
        <div class="panel" style="flex-grow: 1; display: flex; flex-direction: column;">
            <div class="tabs">
                <button class="tab-btn active" data-tab="chat">Chat</button>
                <button class="tab-btn" data-tab="image">Image Generation</button>
            </div>

            <!-- Chat Tab -->
            <div class="tab-content active" id="tab-chat">
                <div class="messages" id="messages"></div>
                <div class="form-group" style="margin-bottom: 0.5rem;">
                    <div style="display:flex; gap: 1rem;">
                        <div style="flex:1;">
                             <label>Agent (Override)</label>
                             <select id="agent-select">
                                 <option value="">Default (Auto)</option>
                             </select>
                        </div>
                        <div style="flex:1;">
                            <label>Endpoint</label>
                             <select id="endpoint-select">
                                 <option value="/chat">/chat (Full)</option>
                                 <option value="/chat/simple">/chat/simple</option>
                             </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>System Prompt (Optional, /chat only)</label>
                    <input type="text" id="system-prompt" placeholder="You are a helpful assistant...">
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label>Prompt</label>
                    <textarea id="prompt-input" placeholder="Type your prompt here..."></textarea>
                </div>
                <div class="button-group">
                    <button id="send-btn">Send Request</button>
                    <button id="interrupt-btn" class="danger">Interrupt</button>
                    <button id="clear-btn" class="diagnostics-btn">Clear</button>
                </div>
            </div>

            <!-- Image Tab -->
            <div class="tab-content" id="tab-image">
                <div class="image-gallery" id="image-gallery"></div>
                <div class="form-group" style="margin-top: 1rem;">
                    <div style="display:flex; gap: 1rem;">
                        <div style="flex:1;">
                            <label>Size</label>
                            <select id="img-size">
                                <option value="auto">Auto</option>
                                <option value="1024x1024">1024×1024</option>
                                <option value="1536x1024">1536×1024 (Landscape)</option>
                                <option value="1024x1536">1024×1536 (Portrait)</option>
                            </select>
                        </div>
                        <div style="flex:1;">
                            <label>Quality</label>
                            <select id="img-quality">
                                <option value="auto">Auto</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div style="flex:0.5;">
                            <label>Count</label>
                            <input type="number" id="img-n" value="1" min="1" max="10">
                        </div>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label>Image Prompt</label>
                    <textarea id="img-prompt" placeholder="Describe the image you want to generate..."></textarea>
                </div>
                <div class="button-group">
                    <button id="img-generate-btn">Generate Image</button>
                    <button id="img-clear-btn" class="diagnostics-btn">Clear Gallery</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        controller: null,
        isGenerating: false
    };

    const els = {
        serverUrl: document.getElementById('server-url'),
        apiKey: document.getElementById('api-key'),
        connectBtn: document.getElementById('connect-btn'),
        statusDot: document.getElementById('status-dot'),
        statusText: document.getElementById('status-text'),
        infoAgent: document.getElementById('info-agent'),
        agentSelect: document.getElementById('agent-select'),
        endpointSelect: document.getElementById('endpoint-select'),
        diagnosticsBtn: document.getElementById('diagnostics-btn'),
        messages: document.getElementById('messages'),
        systemPrompt: document.getElementById('system-prompt'),
        promptInput: document.getElementById('prompt-input'),
        sendBtn: document.getElementById('send-btn'),
        interruptBtn: document.getElementById('interrupt-btn'),
        clearBtn: document.getElementById('clear-btn')
    };

    function appendMessage(text, type = 'token') {
        const span = document.createElement('span');
        span.className = type;
        if (type === 'event') {
            span.innerHTML = `<br><span class="event-label">[${text}]</span> `;
        } else if (type === 'system') {
            span.textContent = text + '\n';
        } else {
            span.textContent = text;
        }
        els.messages.appendChild(span);
        els.messages.scrollTop = els.messages.scrollHeight;
    }

    function getHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        const key = els.apiKey.value.trim();
        if (key) headers['X-API-Key'] = key;
        return headers;
    }

    async function checkConnection() {
        const url = els.serverUrl.value.replace(/\/$/, '') + '/health';
        try {
            const res = await fetch(url, { headers: getHeaders() });
            if (res.ok) {
                const data = await res.json();
                els.statusDot.classList.add('online');
                els.statusText.textContent = 'Connected';
                els.infoAgent.textContent = data.agent || 'None';
                const imgEl = document.getElementById('info-image');
                imgEl.textContent = data.image_ready ? 'Ready ✓' : 'No API Key';
                imgEl.style.color = data.image_ready ? 'var(--success)' : 'var(--text-muted)';
                appendMessage(`[System] Connected to server. Active agent: ${data.agent}`, 'system');
                await loadAgents();
            } else {
                throw new Error(`HTTP ${res.status}`);
            }
        } catch (e) {
            els.statusDot.classList.remove('online');
            els.statusText.textContent = 'Disconnected';
            els.infoAgent.textContent = 'Unknown';
            appendMessage(`[System Error] Failed to connect: ${e.message}`, 'error');
        }
    }

    async function loadAgents() {
        const url = els.serverUrl.value.replace(/\/$/, '') + '/agents';
        try {
            const res = await fetch(url, { headers: getHeaders() });
            if (res.ok) {
                const data = await res.json();
                els.agentSelect.innerHTML = '<option value="">Default (Auto)</option>';
                for (const [agent, available] of Object.entries(data.agents)) {
                    if (available) {
                        const opt = document.createElement('option');
                        opt.value = agent;
                        opt.textContent = agent;
                        els.agentSelect.appendChild(opt);
                    }
                }
            }
        } catch (e) {
            console.error("Failed to load agents", e);
        }
    }

    async function runDiagnostics() {
        const url = els.serverUrl.value.replace(/\/$/, '') + '/diagnose';
        appendMessage(`\n[System] Running diagnostics on ${url}...`, 'system');
        try {
            const res = await fetch(url, { headers: getHeaders() });
            const data = await res.json();
            appendMessage(JSON.stringify(data, null, 2), 'system');
        } catch (e) {
            appendMessage(`[Error] Diagnostics failed: ${e.message}`, 'error');
        }
    }

    async function sendPrompt() {
        const prompt = els.promptInput.value.trim();
        if (!prompt) return;

        if (state.isGenerating) {
            appendMessage(`[System] Already generating...`, 'system');
            return;
        }

        const baseUrl = els.serverUrl.value.replace(/\/$/, '');
        const endpoint = els.endpointSelect.value;
        const url = baseUrl + endpoint;

        const payload = { prompt };
        if (endpoint === '/chat') {
            const sysPrompt = els.systemPrompt.value.trim();
            if (sysPrompt) payload.system = sysPrompt;
            
            const agent = els.agentSelect.value;
            if (agent) payload.agent = agent;
        }

        appendMessage(`\n--- Request to ${endpoint} ---\n`, 'system');
        els.promptInput.value = '';
        state.isGenerating = true;
        els.sendBtn.textContent = 'Generating...';
        els.sendBtn.disabled = true;

        state.controller = new AbortController();

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify(payload),
                signal: state.controller.signal
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(`HTTP ${response.status} - ${err.detail || 'Unknown error'}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            handleEvent(data);
                        } catch (e) {
                            console.error("Parse error", e, line);
                        }
                    }
                }
            }
        } catch (e) {
            if (e.name !== 'AbortError') {
                appendMessage(`[Error] ${e.message}`, 'error');
            }
        } finally {
            state.isGenerating = false;
            els.sendBtn.textContent = 'Send Request';
            els.sendBtn.disabled = false;
            state.controller = null;
        }
    }

    function handleEvent(event) {
        switch (event.type) {
            case 'token':
                if (event.text) appendMessage(event.text, 'token');
                break;
            case 'tool_use':
                appendMessage(`TOOL_USE: ${event.tool}\n`, 'event');
                if (event.input) appendMessage(JSON.stringify(event.input, null, 2) + '\n', 'system');
                break;
            case 'tool_result':
                appendMessage(`TOOL_RESULT`, 'event');
                break;
            case 'image':
                addImageToGallery(event.b64, event.format, event.revised_prompt, event.index);
                break;
            case 'done':
                appendMessage(`\n[DONE]`, 'event');
                break;
            case 'error':
                appendMessage(`\n[ERROR] ${event.message}`, 'error');
                break;
            case 'system':
                appendMessage(`\n[System Output]\n${event.message}\n`, 'system');
                break;
        }
    }

    function addImageToGallery(b64, format, revisedPrompt, index) {
        const gallery = document.getElementById('image-gallery');
        const loading = gallery.querySelector('.image-loading');
        if (loading) loading.remove();

        const card = document.createElement('div');
        card.className = 'image-card';
        const img = document.createElement('img');
        img.src = `data:image/${format};base64,${b64}`;
        img.alt = revisedPrompt || 'Generated image';
        card.appendChild(img);

        const actions = document.createElement('div');
        actions.className = 'image-actions';
        actions.innerHTML = `<span>#${(index || 0) + 1}</span>`;
        const dl = document.createElement('a');
        dl.href = img.src;
        dl.download = `image_${Date.now()}_${index || 0}.${format}`;
        dl.textContent = 'Download';
        actions.appendChild(dl);
        card.appendChild(actions);

        gallery.prepend(card);
    }

    async function generateImage() {
        const prompt = document.getElementById('img-prompt').value.trim();
        if (!prompt) return;

        const baseUrl = els.serverUrl.value.replace(/\/$/, '');
        const gallery = document.getElementById('image-gallery');

        const loading = document.createElement('div');
        loading.className = 'image-loading';
        loading.innerHTML = '<div class="spinner"></div> Generating image...';
        gallery.prepend(loading);

        const btn = document.getElementById('img-generate-btn');
        btn.textContent = 'Generating...';
        btn.disabled = true;

        try {
            const res = await fetch(baseUrl + '/image/generate', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({
                    prompt,
                    size: document.getElementById('img-size').value,
                    quality: document.getElementById('img-quality').value,
                    n: parseInt(document.getElementById('img-n').value) || 1,
                }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `HTTP ${res.status}`);
            }

            const data = await res.json();
            if (loading.parentNode) loading.remove();
            (data.images || []).forEach((img, i) => addImageToGallery(img.b64, img.format, img.revised_prompt, i));
            document.getElementById('img-prompt').value = '';
        } catch (e) {
            if (loading.parentNode) loading.remove();
            const errDiv = document.createElement('div');
            errDiv.className = 'image-loading';
            errDiv.style.color = 'var(--error)';
            errDiv.textContent = `Error: ${e.message}`;
            gallery.prepend(errDiv);
        } finally {
            btn.textContent = 'Generate Image';
            btn.disabled = false;
        }
    }

    async function interruptGeneration() {
        if (!state.isGenerating) return;
        
        appendMessage(`\n[System] Sending interrupt...`, 'system');
        const url = els.serverUrl.value.replace(/\/$/, '') + '/interrupt';
        
        try {
            await fetch(url, { method: 'POST', headers: getHeaders() });
        } catch (e) {
            appendMessage(`[Error] Interrupt failed: ${e.message}`, 'error');
        }
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    // Event Listeners
    els.connectBtn.addEventListener('click', checkConnection);
    els.diagnosticsBtn.addEventListener('click', runDiagnostics);
    els.sendBtn.addEventListener('click', sendPrompt);
    els.interruptBtn.addEventListener('click', interruptGeneration);
    els.clearBtn.addEventListener('click', () => { els.messages.innerHTML = ''; });
    els.promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendPrompt();
    });
    document.getElementById('img-generate-btn').addEventListener('click', generateImage);
    document.getElementById('img-clear-btn').addEventListener('click', () => {
        document.getElementById('image-gallery').innerHTML = '';
    });
    document.getElementById('img-prompt').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateImage();
    });

    // Initial check
    setTimeout(checkConnection, 500);
</script>
</body>
</html>
